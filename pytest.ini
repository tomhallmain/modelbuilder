[pytest]
# Per-test caps use @pytest.mark.timeout (requires pytest-timeout). Global 0 = no default cap.
timeout = 0
timeout_method = thread
markers =
    slow: marks tests as slow (deselect with '-m "not slow"').
    e2e: CLI pipeline tests (data → train → convert; torch/onnx; long-running). Not the PySide6 shell.
    requires_torch: skipped automatically if torch is not installed (optional; use importorskip in test).
    requires_tf: Keras/TensorFlow training smoke (optional; use importorskip in test).
    requires_onnx: optional marker for ONNX-dependent tests.
    ui: PySide6 / pytest-qt headless GUI tests.
    ui_e2e: full UI flows — shell nav/About and (in test_ui_e2e_headless) train+ONNX via Train/Convert pages.
