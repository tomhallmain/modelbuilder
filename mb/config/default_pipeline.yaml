# Default pipeline / ML job configuration (model, data, training, paths).
# Loaded by mb.pipeline_config — not the desktop shell (see mb/config/application.example.yaml).

model:
  default_type: image_classification
  default_framework: pytorch
  default_architecture: resnet34

data:
  raw_data_dir: raw_data
  # Train/test dataset root (train/, test/) after create-dataset; separate from raw_data_dir.
  data_dir: data
  # Per-class test count (fixed mode); also the anchor for dataset_weighted — no separate anchor key.
  test_per_class: 1000
  # fixed | dataset_weighted (modulated test counts by class size — see mb.data.dataset)
  test_split_mode: fixed
  # null = same as test_per_class (anchor); used only when test_split_mode is dataset_weighted
  test_small_class_threshold: null
  # Optional default RNG seed for create-dataset; CLI --seed overrides when passed.
  seed: null
  image_size: 224
  # null = omit from training merge so the model type’s default batch size applies
  batch_size: null
  image_types:
    - .jpg
    - .jpeg
    - .png
    - .tif
    - .tiff
    - .webp
    - .bmp
    - .gif
    - .heic
    - .avif
  video_types:
    - .mp4
    - .mkv
    - .avi
    - .wmv
    - .mov
    - .flv
  # null = discover subdirs of raw_data_dir; optional explicit class folder names
  class_names: null
  # null = any class folder layout under raw data; else require raw_data/<class>/<this_subdir>/…
  class_qualifying_subdir: null
  # mb data gather / ImageGatherer defaults (gather → convert → create-dataset).
  # default_target_dir / default_rejected_dir are under data.raw_data_dir unless absolute.
  gather:
    default_target_count: 100000
    default_target_dir: coherent
    default_rejected_dir: rejected

training:
  frozen_epochs: 5
  unfrozen_epochs: 20
  frozen_lr: 0.001
  unfrozen_lr_max: 0.0003
  unfrozen_lr_min: 0.00001
  num_workers: 12
  store_checkpoints: false

paths:
  models_dir: data/models
  logs_dir: logs
